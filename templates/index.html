<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Contact List -->
        <aside class="sidebar">
            <header class="user-profile">
                <div class="avatar"></div>
                <span style="font-weight: bold; font-size: 14px;">{{ current_user.username }}</span>
                <a href="/logout" class="logout-btn">Logout</a>
            </header>
            <div class="search-bar">
                <input type="text" placeholder="Search or start new chat">
            </div>
            <div class="chat-list">
                {% for user in users %}
                <div class="chat-item" onclick="selectUser({{ user.id }}, '{{ user.username }}')">
                    <div class="avatar"></div>
                    <div class="chat-info">
                        <h4>{{ user.username }}</h4>
                    </div>
                </div>
                {% endfor %}
            </div>
        </aside>

        <!-- Main Chat Window -->
        <main class="chat-window">
            <header class="chat-header">
                <div class="avatar"></div>
                <div class="chat-details">
                    <h3>Global Chat</h3>
                    <span>Online</span>
                </div>
            </header>

            <div class="message-container">
                <p class="select-prompt">Select a user to start chatting</p>
            </div>

            <footer class="chat-input">
                <button id="emoji-btn" class="emoji-btn" type="button">😊</button>

                <!-- Emoji, Gif and Sticker Panel -->
                <div id="picker-panel" style="display:none;">
                    <div class="picker-tabs">
                        <button class="tab-btn active" data-tab="emoji">😊 Emoji</button>
                        <button class="tab-btn" data-tab="gif">GIF</button>
                        <button class="tab-btn" data-tab="sticker">🎭 Sticker</button>
                    </div>
                    <div id="tab-emoji" class="tab-content active">
                        <div id="emoji-picker-container"></div>
                    </div>
                    <div id="tab-gif" class="tab-content" style="display:none;">
                        <input type="text" id="gif-search" placeholder="Search GIFs...">
                        <div id="gif-results"></div>
                    </div>
                    <div id="tab-sticker" class="tab-content" style="display:none;">
                        <div id="sticker-results"></div>
                    </div>
                </div>
                <label for="photo-upload" class="photo-btn" title="Send photo">📷</label>
                <input type="file" id="photo-upload" accept="image/*" style="display:none">
                <input type="text" id="message-input" placeholder="Type a message">
                <button id="send-btn">Send</button>
            </footer>
        </main>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
