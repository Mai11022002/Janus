<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Contact List -->
        <aside class="sidebar">
            <header class="user-profile">
                <div class="avatar"></div>
                <span style="font-weight: bold; font-size: 14px;">{{ current_user.username }}</span>
                <button id="new-contact-btn" class="new-contact-btn" title="New Contact">✏️</button>
                <a href="/logout" class="logout-btn">Logout</a>
            </header>

            <!-- New Contact Panel -->
            <div id="new-contact-panel" style="display:none;">
                <div class="new-contact-header">
                    <button id="close-contact-btn" class="back-btn">← Back</button>
                    <h3>New Contact</h3>
                </div>
                <div class="new-contact-form">
                    <p id="contact-error" class="error" style="display:none;"></p>
                    <p id="contact-success" style="display:none; color:green; font-size:13px; margin-bottom:10px;"></p>
                    <input type="text" id="contact-firstname" placeholder="First Name (optional)">
                    <input type="text" id="contact-lastname" placeholder="Last Name (optional)">
                    <input type="tel" id="contact-phone" placeholder="Phone Number (e.g. +16131234567) (required)">
                    <button id="add-contact-btn">Add Contact</button>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search or start new chat">
            </div>
            <div class="chat-list">
                {% for user in users %}
                <div class="chat-item">
                    <div class="chat-item-click-zone" onclick="selectUser({{ user.id }}, '{{ user.username }}')" style="display: flex; align-items: center; flex: 1; width: 100%;">
                        <div class="avatar"></div>
                        <div class="chat-info">
                            <h4>{{ user.username }}</h4>
                        </div>
                    </div>
                    <div class="chat-item-menu">
                        <button class="menu-trigger" onclick="toggleMenu(event, {{ user.id }})">⋮</button>
                        <div class="dropdown-menu" id="menu-{{ user.id }}">
                            <button onclick="deleteChat(event, {{ user.id }})">🗑️ Delete Chat</button>
                            <button class="danger" onclick="deleteContact(event, {{ user.id }})">⛔ Delete Contact</button>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </aside>

        <!-- Main Chat Window -->
        <main class="chat-window">
            <header class="chat-header">
                <div class="avatar"></div>
                <div class="chat-details">
                    <h3>Global Chat</h3>
                    <span>Online</span>
                </div>
                <div class="call-menu-wrapper">
                    <button id="call-btn" class="call-btn" title="Start a call">📞</button>
                    <div id="call-dropdown" class="call-dropdown">
                        <button class="call-option" onclick="startCall('audio')">🎙️ Audio Call</button>
                        <button class="call-option" onclick="startCall('video')">📹 Video Call</button>
                    </div>
                </div>
            </header>

            <div class="message-container">
                <p class="select-prompt">Select a user to start chatting</p>
            </div>

            <footer class="chat-input">
                <button id="emoji-btn" class="emoji-btn" type="button">😊</button>

                <!-- Emoji, Gif and Sticker Panel -->
                <div id="picker-panel" style="display:none;">
                    <div class="picker-tabs">
                        <button class="tab-btn active" data-tab="emoji">😊 Emoji</button>
                        <button class="tab-btn" data-tab="gif">GIF</button>
                        <button class="tab-btn" data-tab="sticker">🎭 Sticker</button>
                    </div>
                    <div id="tab-emoji" class="tab-content active">
                    </div>
                    <div id="tab-gif" class="tab-content" style="display:none;">
                        <input type="text" id="gif-search" placeholder="Search GIFs...">
                        <div id="gif-results"></div>
                    </div>
                    <div id="tab-sticker" class="tab-content" style="display:none;">
                        <div id="sticker-results"></div>
                    </div>
                </div>
                <label for="photo-upload" class="photo-btn" title="Send photo">📷</label>
                <input type="file" id="photo-upload" accept="image/*" style="display:none">
                <input type="text" id="message-input" placeholder="Type a message">
                <button id="send-btn">Send</button>
            </footer>
        </main>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='chat.js') }}"></script>
    <div id="call-overlay" class="call-overlay" style="display: none;">
        <div class="call-card">
            <h2 id="call-status-title">Calling...</h2>
            <div class="video-grid">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="call-controls">
                <button id="hangup-btn" class="hangup-btn">🚫 End Call</button>
            </div>
        </div>
    </div>
</body>
</html>
